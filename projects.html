<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rylogix projects and builds."
    />
    <meta name="author" content="Rylogix" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1b1b1b" />
    <meta property="og:title" content="Rylogix Projects" />
    <meta
      property="og:description"
      content="Rylogix projects and builds."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rylogix.com/projects.html" />
    <meta property="og:image" content="https://rylogix.com/og-image.png" />

    <link rel="icon" href="/favicon.png?v=2" type="image/png" />
    <link rel="canonical" href="https://rylogix.com/projects.html" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    />

    <script>
      (function () {
        document.documentElement.setAttribute("data-theme", "dark");
        document.documentElement.style.colorScheme = "dark";

        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
          metaTheme.setAttribute("content", "#1b1b1b");
        }
      })();
    </script>

    <link rel="stylesheet" href="css/styles.css?v=5" />
    <title>Projects | Rylogix</title>
  </head>
  <body>
    <div class="decal-bg" aria-hidden="true">
      <canvas class="constellation-canvas" aria-hidden="true"></canvas>
    </div>
    <header class="topbar">
      <div class="container topbar-inner">
        <nav class="brand" aria-label="Primary">
          <a class="home-link" href="index.html" aria-label="Go to home">
            <img
              class="home-logo"
              src="assets/images/rylogix-crown.png"
              alt="Rylogix logo"
            />
          </a>
          <a class="topbar-link" href="#projects">Projects</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="projects" id="projects">
        <div class="container">
          <div class="section-title" data-reveal>
            <h2>Projects</h2>
            <span class="underline"></span>
          </div>
          <div class="projects-layout">
            <section class="project-category" aria-label="Roblox Games">
              <div class="project-category-header" data-reveal>
                <p class="project-category-label">Roblox Games</p>
              </div>
              <div class="projects-grid">
                <a
                  class="project-card glow-card roblox-game-card"
                  href="https://www.roblox.com/games/98311703008851"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-roblox-game
                  data-reveal
                  data-tilt-max="6"
                  data-tilt-lift="6"
                  data-tilt-scale="1.02"
                  data-tilt-glow="0.35"
                  data-tilt-hover-lift="6"
                  data-tilt-hover-scale="1.02"
                  data-tilt-hover-glow="0.25"
                  aria-label="Open Food Jackpot on Roblox"
                >
                  <div class="project-media">
                    <img data-roblox-icon alt="Food Jackpot game icon" />
                  </div>
                  <div class="project-body">
                    <h3 data-roblox-name>Food Jackpot</h3>
                    <div class="roblox-game-stats" aria-live="polite">
                      <p>
                        <span>Current CCU</span>
                        <strong data-roblox-playing>Loading...</strong>
                      </p>
                      <p>
                        <span>Total visits</span>
                        <strong data-roblox-visits>Loading...</strong>
                      </p>
                    </div>
                  </div>
                </a>
              </div>
            </section>

            <section class="project-category" aria-label="Websites">
              <div class="project-category-header" data-reveal>
                <p class="project-category-label">Websites</p>
              </div>
              <div class="projects-grid">
                <a
                  class="project-card glow-card"
                  href="https://gobleno.co.uk/"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-reveal
                  data-tilt-max="6"
                  data-tilt-lift="6"
                  data-tilt-scale="1.02"
                  data-tilt-glow="0.35"
                  data-tilt-hover-lift="6"
                  data-tilt-hover-scale="1.02"
                  data-tilt-hover-glow="0.25"
                  aria-label="Open Gobleno website"
                >
                  <div class="project-media">
                    <img
                      src="assets/images/projects/gobleno.png"
                      alt="Gobleno thumbnail"
                      loading="lazy"
                      decoding="async"
                    />
                  </div>
                  <div class="project-body">
                    <h3>Gobleno.co.uk</h3>
                    <p>Client website built for Gobleno.</p>
                  </div>
                </a>
                <a
                  class="project-card glow-card"
                  href="https://talangray.com/"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-reveal
                  data-tilt-max="6"
                  data-tilt-lift="6"
                  data-tilt-scale="1.02"
                  data-tilt-glow="0.35"
                  data-tilt-hover-lift="6"
                  data-tilt-hover-scale="1.02"
                  data-tilt-hover-glow="0.25"
                  aria-label="Open Talangray website"
                >
                  <div class="project-media">
                    <img
                      src="assets/images/projects/talangray.png"
                      alt="Talangray thumbnail"
                      loading="lazy"
                      decoding="async"
                    />
                  </div>
                  <div class="project-body">
                    <h3>Talangray.com</h3>
                    <p>Client website built for Talangray.</p>
                  </div>
                </a>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; Rylogix. All rights reserved.</div>
    </footer>

    <script src="js/roblox-game.js?v=1" defer></script>
    <script src="js/effects.js?v=4" defer></script>
  </body>
</html>
